name: Deploy Landing

on:
  push:
    branches:
      - main
    paths:
      - './'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Resolve desktop download URLs
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          release_json="$(mktemp)"
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/memohai/Memoh/releases/latest" \
            > "${release_json}"

          asset_url() {
            local pattern="$1"
            jq -r --arg pattern "${pattern}" '[.assets[] | select(.name | test($pattern; "i")) | .browser_download_url][0] // empty' "${release_json}"
          }

          release_tag="$(jq -r '.tag_name // empty' "${release_json}")"
          mac_arm_url="$(asset_url 'mac-arm64.*\.dmg$')"
          mac_intel_url="$(asset_url 'mac-x64.*\.dmg$')"
          windows_url="$(asset_url 'win-x64.*setup.*\.exe$')"
          linux_deb_amd64_url="$(asset_url 'linux-amd64.*\.deb$')"
          linux_appimage_x86_64_url="$(asset_url 'linux-x86_64.*\.AppImage$')"

          missing=0
          for name in release_tag mac_arm_url mac_intel_url windows_url linux_deb_amd64_url linux_appimage_x86_64_url; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing ${name} in latest Memoh release assets"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            jq -r '.assets[].name' "${release_json}"
            exit 1
          fi

          {
            echo "VITE_MEMOH_DESKTOP_RELEASE_TAG=${release_tag}"
            echo "VITE_MEMOH_DESKTOP_DOWNLOAD_MAC_ARM=${mac_arm_url}"
            echo "VITE_MEMOH_DESKTOP_DOWNLOAD_MAC_INTEL=${mac_intel_url}"
            echo "VITE_MEMOH_DESKTOP_DOWNLOAD_WINDOWS=${windows_url}"
            echo "VITE_MEMOH_DESKTOP_DOWNLOAD_LINUX_DEB_AMD64=${linux_deb_amd64_url}"
            echo "VITE_MEMOH_DESKTOP_DOWNLOAD_LINUX_APPIMAGE_X86_64=${linux_appimage_x86_64_url}"
          } >> "${GITHUB_ENV}"
      
      - name: Build with Vite
        run: pnpm build
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: memoh.ai
